---
- name: Create User with Conda Setup
  hosts: all
  become: true
  vars_prompt:
    - name: user_name
      prompt: "Enter username"
      private: no
    - name: user_password
      prompt: "Enter password"
      private: yes
  tasks:
    - name: Create user
      ansible.builtin.user:
        name: "{{ user_name }}"
        skeleton: /etc/skel
        create_home: yes

    - name: Set password via passwd
      ansible.builtin.shell: |
        echo -e "{{ user_password }}\n{{ user_password }}" | passwd {{ user_name }}

    - name: Create /data/{{ user_name }}
      ansible.builtin.file:
        path: "/data/{{ user_name }}"
        state: directory
        owner: "{{ user_name }}"
        mode: '0755'

    - name: Create /data/{{ user_name }}/conda/pkgs (with parents)
      ansible.builtin.file:
        path: "/data/{{ user_name }}/conda/pkgs"
        state: directory
        owner: "{{ user_name }}"
        mode: '0755'

    - name: Create /data/{{ user_name }}/conda/envs (with parents)
      ansible.builtin.file:
        path: "/data/{{ user_name }}/conda/envs"
        state: directory
        owner: "{{ user_name }}"
        mode: '0755'

    - name: Configure .bash_profile to cd to /data/$USER
      ansible.builtin.blockinfile:
        path: "/home/{{ user_name }}/.bash_profile"
        block: |
          # >>> ansible user setup >>>
          cd /data/{{ user_name }}
          # <<< ansible user setup <<<
        marker: "# {mark} ANSIBLE MANAGED BLOCK"

    - name: Configure conda in .bashrc
      ansible.builtin.blockinfile:
        path: "/home/{{ user_name }}/.bashrc"
        block: |
          # >>> conda initialize >>>
          export PATH="/opt/anaconda3/bin:$PATH"
          export CONDA_PKGS_DIRS="/data/{{ user_name }}/conda/pkgs"
          export CONDA_ENVS_PATH="/data/{{ user_name }}/conda/envs"
          . /opt/anaconda3/etc/profile.d/conda.sh
          # <<< conda initialize <<<
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
